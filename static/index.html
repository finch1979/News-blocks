<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>方塊磚新聞</title>

<!-- GridStack -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css"/>
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<!-- ── TOP BAR ─────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <span class="logo"><i class="fa-solid fa-table-cells-large"></i> 方塊磚新聞</span>
    <span class="tagline">個人化新聞牆</span>
  </div>
  <div class="topbar-right">
    <button class="btn-icon" id="btn-add" title="新增方塊"><i class="fa fa-plus"></i> 新增</button>
    <button class="btn-icon" id="btn-save-layout" title="儲存排版"><i class="fa fa-save"></i> 儲存</button>
    <button class="btn-icon" id="btn-toggle-edit" title="切換編輯模式"><i class="fa fa-lock-open"></i> 編輯中</button>
  </div>
</header>

<!-- ── BLOCK WALL ─────────────────────────────────────────── -->
<main class="wall-container">
  <div class="grid-stack" id="grid"></div>
  
  <!-- Page Navigation -->
  <div class="page-nav">
    <button id="page-prev" class="page-nav-btn" title="上一頁">
      <i class="fa fa-arrow-left"></i>
    </button>
    <span id="page-info" class="page-info">新聞</span>
    <button id="page-next" class="page-nav-btn" title="下一頁">
      <i class="fa fa-arrow-right"></i>
    </button>
  </div>
</main>

<!-- ── FULLSCREEN VIEWER ──────────────────────────────────── -->
<div id="viewer" class="viewer hidden">
  <div class="viewer-toolbar">
    <span id="viewer-title" class="viewer-title"></span>
    <div class="viewer-actions">
      <button id="viewer-refresh" title="重新整理"><i class="fa fa-rotate-right"></i></button>
      <button id="viewer-newtab" title="在新分頁開啟"><i class="fa fa-external-link-alt"></i></button>
      <button id="viewer-close" title="關閉 (Esc)"><i class="fa fa-xmark"></i> 關閉</button>
    </div>
  </div>
  <div class="viewer-body">
    <iframe id="viewer-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>
    <div id="viewer-blocked" class="viewer-blocked hidden">
      <i class="fa fa-ban fa-3x"></i>
      <p>此網站不允許內嵌顯示</p>
      <button id="viewer-open-newtab" class="btn-primary"><i class="fa fa-external-link-alt"></i> 在新分頁開啟</button>
    </div>
  </div>
</div>

<!-- ── CONTEXT MENU ───────────────────────────────────────── -->
<ul id="ctx-menu" class="ctx-menu hidden">
  <li data-action="newtab"><i class="fa fa-external-link-alt"></i> 開啟網頁</li>
  <li class="divider"></li>
  <li data-action="edit"><i class="fa fa-pen"></i> 編輯</li>
  <li data-action="pin"><i class="fa fa-thumbtack"></i> 釘住 / 取消釘住</li>
  <li data-action="refresh-toggle"><i class="fa fa-clock-rotate-left"></i> 自動更新設定</li>
  <li class="divider"></li>
  <li data-action="delete" class="danger"><i class="fa fa-trash"></i> 刪除</li>
</ul>

<!-- ── EDIT / ADD MODAL ───────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">新增方塊</h2>
      <button class="modal-close" id="modal-close"><i class="fa fa-xmark"></i></button>
    </div>
    <form id="block-form">
      <label>標題
        <input type="text" id="f-title" placeholder="例：ESPN 運動" required maxlength="40"/>
      </label>
      <label>網址
        <div class="url-row">
          <input type="url" id="f-url" placeholder="https://…" required/>
          <button type="button" id="btn-fetch-title" class="btn-sm"><i class="fa fa-wand-magic-sparkles"></i> 自動抓取標題</button>
        </div>
      </label>
      <label>方塊顏色
        <div class="color-picker-row">
          <div id="color-swatches" class="color-swatches"></div>
          <input type="color" id="f-color" value="#4285f4" title="自訂顏色"/>
        </div>
      </label>
      <label>自動刷新間隔（秒，0 = 關閉）
        <input type="number" id="f-refresh" value="0" min="0" max="3600" step="30"/>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="f-pinned"/> 釘住此方塊
      </label>
      <div class="modal-footer">
        <button type="button" id="modal-cancel" class="btn-ghost">取消</button>
        <button type="submit" class="btn-primary"><i class="fa fa-check"></i> 儲存</button>
      </div>
    </form>
  </div>
</div>

<!-- ── REFRESH MODAL ─────────────────────────────────────── -->
<div id="refresh-modal" class="modal-overlay hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>自動更新設定</h2>
      <button class="modal-close" id="refresh-modal-close"><i class="fa fa-xmark"></i></button>
    </div>
    <label>刷新間隔（秒，0 = 關閉）
      <input type="number" id="r-interval" value="0" min="0" max="3600" step="30"/>
    </label>
    <div class="modal-footer">
      <button type="button" id="refresh-cancel" class="btn-ghost">取消</button>
      <button type="button" id="refresh-save" class="btn-primary">確定</button>
    </div>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────── -->
<div id="toast" class="toast hidden"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
